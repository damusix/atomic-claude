<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atomic serve — {{.ScopeLabel}}</title>
    <!-- Before-paint theme init: reads localStorage first, falls back to OS prefers-color-scheme.
         Runs synchronously before first paint to avoid a flash of wrong theme. -->
    <script>
    (function() {
      var stored = null;
      try { stored = localStorage.getItem('atomic-serve-theme'); } catch (e) {}
      var theme = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }());
    </script>
    <!-- Mermaid theming. Diagrams are rendered with theme:'base' + themeVariables
         pulled LIVE from the site's CSS custom properties, so a diagram matches the
         active light/dark palette with no per-theme branch (the active theme's vars
         are read at call time). The raw diagram source is stashed on each
         <pre class="mermaid"> the first time it renders, so a later theme toggle can
         restore it and re-render (mermaid replaces the <pre> with an <svg> on run).
         Defined here in the shell head so every page fragment can call it; the
         mermaid library itself is loaded lazily by fragments that contain diagrams. -->
    <script>
    function atomicMermaidThemeVars() {
      var s = getComputedStyle(document.documentElement);
      function v(name, fallback) { var x = s.getPropertyValue(name).trim(); return x || fallback; }
      var ink     = v('--ink', '#211d18');
      var surface = v('--paper-raised', '#ffffff');
      var sunk    = v('--paper-sunk', '#f5f3ee');
      var paper   = v('--paper', '#fbfaf8');
      var border  = v('--hairline-2', '#e2ddd2');
      var line    = v('--edge-strong', '#b1a48f');
      var sans    = v('--sans', '"Inter", system-ui, sans-serif');
      return {
        background:           paper,
        mainBkg:              surface,
        primaryColor:         surface,
        primaryTextColor:     ink,
        primaryBorderColor:   border,
        secondaryColor:       sunk,
        secondaryTextColor:   ink,
        secondaryBorderColor: border,
        tertiaryColor:        paper,
        tertiaryTextColor:    ink,
        tertiaryBorderColor:  border,
        nodeBorder:           border,
        nodeTextColor:        ink,
        lineColor:            line,
        textColor:            ink,
        titleColor:           ink,
        edgeLabelBackground:  surface,
        clusterBkg:           sunk,
        clusterBorder:        border,
        fontFamily:           sans,
        fontSize:             '14px'
      };
    }

    function atomicMermaidConfig() {
      return {
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'base',
        themeVariables: atomicMermaidThemeVars()
      };
    }

    // Initial render: stash each diagram's source, then initialize + run.
    window.atomicMermaidInit = function() {
      if (!window.mermaid) { return; }
      document.querySelectorAll('pre.mermaid').forEach(function(el) {
        if (!el.dataset.mermaidSrc) { el.dataset.mermaidSrc = el.textContent; }
      });
      window.mermaid.initialize(atomicMermaidConfig());
      try { window.mermaid.run(); } catch (e) {}
    };

    // Re-theme on light/dark toggle: restore each diagram's stashed source, drop
    // the processed flag, re-initialize with the new palette, and re-run.
    window.atomicMermaidRetheme = function() {
      if (!window.mermaid) { return; }
      var nodes = document.querySelectorAll('pre.mermaid[data-mermaid-src]');
      if (!nodes.length) { return; }
      nodes.forEach(function(el) {
        el.removeAttribute('data-processed');
        el.innerHTML = el.dataset.mermaidSrc;
      });
      window.mermaid.initialize(atomicMermaidConfig());
      try { window.mermaid.run({ nodes: nodes }); } catch (e) {}
    };
    </script>
    <!-- Editorial fonts: Newsreader (serif display), Inter (UI sans), JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
    <!-- History restores must come back as the FULL shell, not a #main-pane
         fragment. htmx 4 keeps no localStorage history cache, so every Back/Forward
         is a fresh GET carrying HX-History-Restore-Request (alongside HX-Request);
         the server guards on that header (fragmentRequest in context_handler.go)
         and returns the shell, which htmx swaps into <body>. No client config is
         needed — htmx 4 removed the htmx-config historyRestoreAsHxRequest key. -->
    <script src="/static/vendor/htmx.min.js"></script>
    <!-- Cytoscape + cola — LOAD ORDER IS LOAD-BEARING: cytoscape → cola → cytoscape-cola.
         Powers the rail mini-graph (FE2) and the Network View (FE3). cola is the
         force-directed layout engine (one-shot). webcola exports window.cola while
         cytoscape-cola's browser path reads window.webcola, so bridge the name
         before registering. -->
    <script src="/static/vendor/cytoscape.min.js"></script>
    <script src="/static/vendor/cola.min.js"></script>
    <script>window.webcola = window.cola;</script>
    <script src="/static/vendor/cytoscape-cola.js"></script>
    <script>try { if (window.cytoscapeCola) { cytoscape.use(cytoscapeCola); } } catch (e) {}</script>
    <!-- Single-source type→color map. atomicCyStyle() reads it to build per-type
         node selectors; the system-graph legend (Deliverable A) reads it for swatch
         colors. Hex values are defined ONCE here — neither atomicCyStyle() nor the
         legend duplicates them. -->
    <script>
    // darken: multiplies each RGB channel by (1 - amount). amount=0.1 → 10% darker.
    // Accepts a 6-digit hex string ("#rrggbb") and returns a new hex string.
    function darken(hex, amount) {
      var h = hex.replace('#', '');
      if (h.length !== 6) { return hex; }
      var f = 1 - amount;
      var r = Math.round(parseInt(h.slice(0, 2), 16) * f);
      var g = Math.round(parseInt(h.slice(2, 4), 16) * f);
      var b = Math.round(parseInt(h.slice(4, 6), 16) * f);
      return '#' + [r, g, b].map(function(c) {
        return Math.max(0, Math.min(255, c)).toString(16).padStart(2, '0');
      }).join('');
    }

    function atomicCyTypeColors() {
      // Read ALL graph color tokens from CSS custom properties so the graph
      // re-themes automatically on light/dark toggle. Provides safe fallbacks.
      var style = getComputedStyle(document.documentElement);
      function v(name) { return style.getPropertyValue(name).trim(); }
      var pageColor      = v('--c-page')      || '#89b4fa';
      var repoColor      = v('--c-repo')      || '#a6e3a1';
      var concernColor   = v('--c-concern')   || '#cba6f7';
      var knowledgeColor = v('--c-knowledge') || '#f38ba8';
      var bucketColor    = v('--c-bucket')    || '#fab387';
      var externalColor  = v('--c-external')  || '#6c7086';
      return {
        // Node type solid colors (used as gradient base + derived darker stop).
        'page':      pageColor,
        'repo':      repoColor,
        'concern':   concernColor,
        'knowledge': knowledgeColor,
        'bucket':    bucketColor,
        'external':  externalColor,
        // Derived 10%-darker gradient stop for each type.
        'page-dark':      darken(pageColor,      0.10),
        'repo-dark':      darken(repoColor,      0.10),
        'concern-dark':   darken(concernColor,   0.10),
        'knowledge-dark': darken(knowledgeColor, 0.10),
        'bucket-dark':    darken(bucketColor,    0.10),
        'external-dark':  darken(externalColor,  0.10),
        // Per-type ink colors (node label text color).
        'page-ink':      v('--c-page-ink')      || '#3a63a8',
        'repo-ink':      v('--c-repo-ink')      || '#3f7a3a',
        'concern-ink':   v('--c-concern-ink')   || '#6f4aa6',
        'knowledge-ink': v('--c-knowledge-ink') || '#9c2f4c',
        'bucket-ink':    v('--c-bucket-ink')    || '#8a4a1a',
        'external-ink':  v('--c-external-ink')  || '#4a4e63',
        // Default node colors (for nodes whose type is unknown or empty).
        'default-fill':  pageColor,
        'default-dark':  darken(pageColor, 0.10),
        'default-label': v('--ink')         || '#211d18',
        // Label chip: a paper-surface pill behind each label so text stays legible
        // over the graph canvas in both themes (was hardcoded to the page color,
        // which made every label a pale-blue pill — unreadable on dark).
        'label-bg':      v('--paper-raised') || '#ffffff',
        'label-border':  v('--hairline-2')   || '#e2ddd2',
        // Edge colors — read from CSS vars so they adapt to dark/light.
        'edge':          v('--edge')        || '#cabfae',
        'edge-strong':   v('--edge-strong') || '#b1a48f',
        // Selected state — amber glow.
        'selected':      v('--amber-bright') || '#d99a1f'
      };
    }
    </script>
    <!-- Shared Cytoscape style factory — used by BOTH the rail mini-graph (FE2) and
         the system-graph toggle (FE3). One definition, two consumers. Do NOT copy
         the style array into either consumer; call atomicCyStyle() instead.

         A-style glowing nodes: circular wash fill + typed outer stroke + soft drop-shadow.
         All colors read from atomicCyTypeColors() which reads CSS vars — so the graph
         re-themes with light/dark toggle automatically (CP1 review finding fix). -->
    <script>
    function atomicCyStyle() {
      var colors = atomicCyTypeColors();
      // Build per-type node selectors: solid diagonal gradient fill, hairline border.
      // Each type selector sets the gradient stops so the color is unique per type.
      var typeNames = ['page', 'repo', 'concern', 'knowledge', 'bucket', 'external'];
      var typeSelectors = typeNames.map(function(t) {
        var base   = colors[t]          || colors['default-fill'];
        var darker = colors[t + '-dark'] || darken(base, 0.10);
        return {
          selector: 'node[type="' + t + '"]',
          style: {
            'background-fill': 'linear-gradient',
            'background-gradient-direction': 'to-bottom-right',
            'background-gradient-stop-colors': base + ' ' + darker,
            'background-gradient-stop-positions': '0% 100%',
            'border-color': darker,
            'shadow-color': base,
            'color': colors[t + '-ink'] || colors['default-label']
          }
        };
      });
      return [
        {
          // Default node: 10px solid gradient dot, hairline border, label below.
          selector: 'node',
          style: {
            'label': 'data(label)',
            'background-fill': 'linear-gradient',
            'background-gradient-direction': 'to-bottom-right',
            'background-gradient-stop-colors': colors['default-fill'] + ' ' + colors['default-dark'],
            'background-gradient-stop-positions': '0% 100%',
            'border-width': '1px',
            'border-color': colors['default-dark'],
            'color': colors['default-label'],
            'font-family': '"JetBrains Mono", "Geist Mono", ui-monospace, monospace',
            'font-size': '11px',
            'font-weight': '500',
            // Fade labels out when zoomed far out (rendered font < this many px) so
            // the graph declutters at a distance — Obsidian's "text fade threshold".
            'min-zoomed-font-size': 7,
            'text-valign': 'bottom',
            'text-halign': 'center',
            'text-margin-y': '7px',
            // Size by degree (link count) — hubs are bigger, leaves smaller. 'deg' is
            // injected per node from the edge list before mount; capped so a single
            // mega-hub can't dwarf everything. The rail graph overrides this entry.
            'width': 'mapData(deg, 0, 16, 16, 54)',
            'height': 'mapData(deg, 0, 16, 16, 54)',
            'shape': 'ellipse',
            'text-max-width': '120px',
            'text-wrap': 'ellipsis',
            // Label chip: a paper-surface pill + hairline so text stays legible over
            // the graph canvas (and never bleeds into edges/other nodes), both themes.
            'text-background-color': colors['label-bg'],
            'text-background-opacity': 0.94,
            'text-background-padding': '4px',
            'text-background-shape': 'roundrectangle',
            'text-border-color': colors['label-border'],
            'text-border-width': 1,
            'text-border-opacity': 0.9,
            // Soft outer glow giving each node presence on the system graph.
            'shadow-blur': '10px',
            'shadow-color': colors['page'],
            'shadow-opacity': 0.12,
            'shadow-offset-x': 0,
            'shadow-offset-y': 0
          }
        }
      ].concat(typeSelectors).concat([
        {
          // md-link: solid themed line with subtle arrowhead.
          selector: 'edge.md-link',
          style: {
            'line-color': colors['edge'],
            'line-style': 'solid',
            'target-arrow-color': colors['edge'],
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'width': 1.5,
            'arrow-scale': 0.9
          }
        },
        {
          // wikilink: dashed with the page-type color — Obsidian [[page]] style.
          selector: 'edge.wikilink',
          style: {
            'line-color': colors['edge-strong'],
            'line-style': 'dashed',
            'line-dash-pattern': [5, 3],
            'target-arrow-color': colors['edge-strong'],
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'width': 1.5,
            'arrow-scale': 0.9
          }
        },
        {
          // fingerprint: dashed orange — provenance/reflects: edges (CP10).
          selector: 'edge.fingerprint',
          style: {
            'line-color': '#fab387',
            'line-style': 'dashed',
            'line-dash-pattern': [4, 4],
            'target-arrow-color': '#fab387',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'width': 1.5
          }
        },
        {
          // fingerprint drift: red — drifted provenance edges (SC12).
          selector: 'edge.fingerprint.drift',
          style: {
            'line-color': '#f38ba8',
            'target-arrow-color': '#f38ba8',
            'width': 2.5
          }
        },
        {
          // Selected: amber solid gradient (theme-aware).
          selector: ':selected',
          style: {
            'background-fill': 'linear-gradient',
            'background-gradient-direction': 'to-bottom-right',
            'background-gradient-stop-colors': (colors['selected'] || '#d99a1f') + ' ' + darken(colors['selected'] || '#d99a1f', 0.10),
            'background-gradient-stop-positions': '0% 100%',
            'border-color': darken(colors['selected'] || '#d99a1f', 0.10),
            'shadow-color': colors['selected'] || '#d99a1f',
            'shadow-opacity': 0.35,
            'line-color': colors['selected'] || '#d99a1f'
          }
        }
      ]);
    }
    </script>
    <!-- Shared graph-interaction UI: hover preview card + page modal + navigation.
         Used by BOTH the rail mini-graph (this-page graph) and the system-graph
         toggle — exposed on window.AtomicGraphUI so the two separate <script>
         blocks share one implementation. These helpers used to be nested inside
         setSystemMode(), which made them unreachable from (a) the top-level
         modal-dismiss wiring (so the modal could never be closed) and (b) the
         rail graph's script (so the rail graph had no hover/click). Extracting
         them here is the fix for both. -->
    <script>
    window.AtomicGraphUI = (function() {
      // Optional system-mode-aware navigator, injected by the system-graph script.
      // When in system mode, navigating to a page needs teardown (destroy the
      // system-cy container, clear the mode, reset the toggle) before the swap —
      // the system script registers that here. The rail graph leaves it null and
      // gets a plain htmx swap.
      var navigateHook = null;

      function escapeHTML(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── Preview card ──────────────────────────────────────────────────────────
      // The card element lives in the <body> (appended once, reused).
      function getOrCreatePreviewCard() {
        var el = document.getElementById('cy-preview-card');
        if (!el) {
          el = document.createElement('div');
          el.id = 'cy-preview-card';
          document.body.appendChild(el);
        }
        return el;
      }

      // Show the hover preview for a node, positioned relative to anchorEl — the
      // pane the graph renders in (#main-pane for the system graph, the rail
      // container for the mini-graph).
      function showPreviewCard(cyNode, anchorEl) {
        var card = getOrCreatePreviewCard();
        var type  = cyNode.data('type') || 'page';
        var title = cyNode.data('title') || cyNode.data('label') || '';
        var desc  = cyNode.data('description') || '';
        var snip  = cyNode.data('snippet') || '';

        var html = '<span class="cy-pc-chip ' + type + '">' + escapeHTML(type) + '</span>' +
                   '<div class="cy-pc-title">' + escapeHTML(title) + '</div>';
        if (desc) { html += '<div class="cy-pc-desc">' + escapeHTML(desc) + '</div>'; }
        if (snip) { html += '<div class="cy-pc-snip">' + escapeHTML(snip) + '</div>'; }
        card.innerHTML = html;

        // renderedPosition() is relative to the Cytoscape CONTAINER element, so anchor
        // to that exact element's viewport rect — not a passed-in pane, which may not
        // share the container's origin. The card is position:fixed on <body>, so
        // rect.left/top (viewport coords) + the rendered offset land it on the node.
        var pos  = cyNode.renderedPosition();
        var container = (cyNode.cy().container && cyNode.cy().container())
          || anchorEl || document.getElementById('main-pane');
        var rect = container.getBoundingClientRect();
        var cardW = 284;
        var cardH = card.offsetHeight || 170;
        var gap = 14;
        var left = rect.left + pos.x + gap;
        var top  = rect.top  + pos.y + gap;
        // Flip to the node's left if the card would overflow the right edge, then
        // clamp fully on-screen on both axes (no off-viewport corners).
        if (left + cardW + 8 > window.innerWidth) { left = rect.left + pos.x - cardW - gap; }
        if (left < 8) { left = 8; }
        if (top + cardH + 8 > window.innerHeight) { top = window.innerHeight - cardH - 8; }
        if (top < 8) { top = 8; }
        card.style.left = left + 'px';
        card.style.top  = top + 'px';
        card.classList.add('open');
      }

      function hidePreviewCard() {
        var card = document.getElementById('cy-preview-card');
        if (card) { card.classList.remove('open'); }
      }

      // ── Page modal ────────────────────────────────────────────────────────────
      // Look up node metadata from the passed cy instance, load the /page/ fragment
      // into the modal body, wire "Open full page", and show the scrim.
      function openPageModal(nodeID, cy) {
        var scrim = document.getElementById('cy-page-modal-scrim');
        if (!scrim) { return; }
        var modalBody  = document.getElementById('cy-modal-body');
        var modalChip  = document.getElementById('cy-modal-chip');
        var modalTitle = document.getElementById('cy-modal-title');
        var modalDesc  = document.getElementById('cy-modal-desc');
        var openBtn    = document.getElementById('cy-modal-open-btn');

        var cyNode  = cy && cy.getElementById(nodeID);
        var hasNode = cyNode && cyNode.length;
        var type  = hasNode ? (cyNode.data('type') || 'page') : 'page';
        var title = hasNode ? (cyNode.data('title') || cyNode.data('label') || nodeID) : nodeID;
        var desc  = hasNode ? (cyNode.data('description') || '') : '';

        if (modalChip)  { modalChip.className = 'cy-modal-chip ' + type; modalChip.textContent = type; }
        if (modalTitle) { modalTitle.textContent = title; }
        if (modalDesc)  { modalDesc.textContent = desc; modalDesc.style.display = desc ? '' : 'none'; }
        if (openBtn)    { openBtn.onclick = function() { navigateToPage(nodeID); }; }

        if (modalBody) {
          modalBody.innerHTML = '<p class="loading">Loading…</p>';
          fetch('/page/' + encodeURIComponent(nodeID), { headers: { 'HX-Request': 'true' } })
            .then(function(r) { return r.text(); })
            .then(function(html) { modalBody.innerHTML = html; modalBody.scrollTop = 0; })
            .catch(function() { modalBody.innerHTML = '<p style="color:var(--ink-faint);font-style:italic">Could not load page.</p>'; });
        }

        scrim.classList.add('open');
      }

      function closePageModal() {
        var scrim = document.getElementById('cy-page-modal-scrim');
        if (scrim) { scrim.classList.remove('open'); }
      }

      // Navigate to a page. Closes the modal + preview card first. Delegates to the
      // registered system navigator when present (system mode needs teardown);
      // otherwise a plain htmx swap into #main-pane (the rail case).
      function navigateToPage(nodeID) {
        closePageModal();
        hidePreviewCard();
        if (navigateHook) { navigateHook(nodeID); return; }
        // Swap the page in, then push the URL so Back/Forward work and a refresh
        // reloads this page (htmx 4 restores history via a fresh server GET).
        var url = '/page/' + encodeURIComponent(nodeID);
        htmx.ajax('GET', url, { target: '#main-pane', swap: 'innerHTML' });
        if (window.history && window.history.pushState) { window.history.pushState(null, '', url); }
      }

      function setNavigator(fn) { navigateHook = fn; }

      // Register modal-dismiss wiring exactly once: scrim backdrop, corner ×,
      // bottom Close button, and Esc.
      var dismissWired = false;
      function wireDismiss() {
        if (dismissWired) { return; }
        dismissWired = true;
        var scrim = document.getElementById('cy-page-modal-scrim');
        if (scrim) {
          scrim.addEventListener('click', function(e) { if (e.target === scrim) { closePageModal(); } });
        }
        var closeBtn = document.getElementById('cy-modal-close-btn');
        if (closeBtn) { closeBtn.addEventListener('click', closePageModal); }
        var dismissBtn = document.getElementById('cy-modal-dismiss-btn');
        if (dismissBtn) { dismissBtn.addEventListener('click', closePageModal); }
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            var s = document.getElementById('cy-page-modal-scrim');
            if (s && s.classList.contains('open')) { s.classList.remove('open'); }
          }
        });
      }

      return {
        showPreviewCard: showPreviewCard,
        hidePreviewCard: hidePreviewCard,
        openPageModal: openPageModal,
        closePageModal: closePageModal,
        navigateToPage: navigateToPage,
        setNavigator: setNavigator,
        wireDismiss: wireDismiss
      };
    }());
    </script>
    <!-- FE2 rail mini-graph: delegated htmx.onLoad handler + OOB swap fallback.
         Inline <script> in OOB innerHTML swaps are not reliably executed by
         htmx 2. The canonical pattern is htmx.onLoad, which fires for every
         newly swapped element. When a [data-rail-graph-url] rail-graph container
         arrives, we fetch the graph data URL and mount a Cytoscape instance.
         Note: [data-rail-graph-url] is a rail-specific attribute — distinct from
         anything the FE3 system-graph toggle uses. No attribute collision.

         OOB swap edge-case: htmx.onLoad fires with elt = the swapped-in node
         itself (the container), not a wrapper. querySelector only matches
         DESCENDANTS, so we also check elt itself via .matches(). The OOB
         afterSwap listener below covers cases where htmx:load is not fired for
         OOB innerHTML swaps. mountRailGraph is factored as a single function
         called from both paths; a dataset flag prevents double-mount. -->
    <script>
    function mountRailGraph(container) {
      // Guard: already mounted (e.g. both htmx.onLoad and htmx:after:settle fired).
      if (container.dataset.railMounted === '1') { return; }
      if (typeof cytoscape === 'undefined') { return; }
      var graphURL = container.getAttribute('data-rail-graph-url');
      var focusNode = container.getAttribute('data-focus-node');
      var railColors = atomicCyTypeColors();
      var railStyle = atomicCyStyle();
      // Override default node entry for the compact rail view — 10px gradient dot,
      // same approach as the system graph but capped at rail size (10px is fine).
      railStyle[0] = {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'background-fill': 'linear-gradient',
          'background-gradient-direction': 'to-bottom-right',
          'background-gradient-stop-colors': railColors['default-fill'] + ' ' + railColors['default-dark'],
          'background-gradient-stop-positions': '0% 100%',
          'border-width': '1px',
          'border-color': railColors['default-dark'],
          'color': railColors['default-label'],
          'font-family': '"JetBrains Mono", "Geist Mono", ui-monospace, monospace',
          'font-size': '9px',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': '5px',
          'width': '10px',
          'height': '10px',
          'shape': 'ellipse',
          'text-max-width': '74px',
          'text-wrap': 'ellipsis',
          // Same paper-surface label chip as the system graph, for legibility.
          'text-background-color': railColors['label-bg'],
          'text-background-opacity': 0.94,
          'text-background-padding': '3px',
          'text-background-shape': 'roundrectangle',
          'text-border-color': railColors['label-border'],
          'text-border-width': 1,
          'text-border-opacity': 0.9,
          'shadow-blur': '5px',
          'shadow-color': railColors['page'],
          'shadow-opacity': 0.12,
          'shadow-offset-x': 0,
          'shadow-offset-y': 0
        }
      };
      // Highlight the focused node with an amber solid gradient.
      var selColor = railColors['selected'] || '#d99a1f';
      var selDark  = darken(selColor, 0.10);
      railStyle.splice(1, 0, {
        selector: 'node[id="' + focusNode + '"]',
        style: {
          'background-fill': 'linear-gradient',
          'background-gradient-direction': 'to-bottom-right',
          'background-gradient-stop-colors': selColor + ' ' + selDark,
          'background-gradient-stop-positions': '0% 100%',
          'border-color': selDark,
          'shadow-color': selColor,
          'shadow-opacity': 0.35
        }
      });
      // Mark mounted before the async fetch so a second call during the fetch
      // also no-ops (no double-mount on rapid navigation).
      container.dataset.railMounted = '1';
      fetch(graphURL)
        .then(function(r) { return r.json(); })
        .then(function(elems) {
          var railCy = cytoscape({
            container: container,
            elements: elems,
            layout: { name: 'concentric', concentric: function(n){ return n.data('id') === focusNode ? 2 : 1; }, levelWidth: function(){ return 1; }, minNodeSpacing: 20 },
            style: railStyle
          });
          // Resize + fit once the layout settles — the container was just htmx-swapped
          // and may report zero dimensions until the browser has laid it out.
          railCy.one('layoutstop', function() { railCy.resize(); railCy.fit(undefined, 12); });
          railCy.ready(function() { railCy.resize(); });

          // Node interactions, shared with the system graph via AtomicGraphUI:
          //   hover → preview card (positioned within the rail container)
          //   click → navigate to that page (the rail is a this-page neighbor map,
          //           so clicking a neighbor visits it — not in system mode, so
          //           navigateToPage does a plain htmx swap into #main-pane).
          if (window.AtomicGraphUI) {
            railCy.on('mouseover', 'node', function(evt) {
              AtomicGraphUI.showPreviewCard(evt.target, container);
            });
            railCy.on('mouseout', 'node', function() {
              AtomicGraphUI.hidePreviewCard();
            });
            railCy.on('tap', 'node', function(evt) {
              AtomicGraphUI.navigateToPage(evt.target.data('id'));
            });
          }

          // Expose for theme re-application on toggle.
          window.__railCy = railCy;
        })
        .catch(function(e) {
          // Reset the mounted flag so a retry (e.g. re-navigate) can try again.
          container.dataset.railMounted = '';
          console.warn('rail mini-graph:', e);
        });
    }

    // Path 1: htmx.onLoad — fires for most swapped elements.
    // elt may be the container itself (OOB innerHTML swap) or a wrapper that
    // contains it; handle both via .matches() + querySelector fallback.
    htmx.onLoad(function(elt) {
      var container = (elt.matches && elt.matches('[data-rail-graph-url]'))
        ? elt
        : (elt.querySelector ? elt.querySelector('[data-rail-graph-url]') : null);
      if (!container) { return; }
      mountRailGraph(container);
    });

    // Path 2: htmx:after:settle — htmx 4 merged the old htmx:oobAfterSwap into the
    // unified swap/settle events, so re-scan for the rail-graph container once a
    // swap has settled (covers the OOB innerHTML swap that arrives with a page
    // load). mountRailGraph's dataset guard makes the repeated scan a no-op once
    // mounted. Listen on document — a detached source dispatches there, not body.
    document.addEventListener('htmx:after:settle', function() {
      var container = document.querySelector('#rail-graph-content [data-rail-graph-url]');
      if (container) { mountRailGraph(container); }
    });
    </script>
    <!-- FE5 search page: SSE result streaming.
         When a /search page fragment (carrying data-search-stream) lands in
         #main-pane, open an EventSource to it and route events:
           md   → fill the markdown section
           code → append one member's results (clears loading on first arrival)
           end  → drop remaining loading indicators; close the stream (also stops
                  the browser auto-reconnecting and replaying the search).
         Inline <script> in swapped content does not run reliably under htmx,
         so this is a delegated htmx.onLoad — same pattern as the rail mini-graph. -->
    <script>
    htmx.onLoad(function(elt) {
      var page = elt.querySelector ? elt.querySelector('[data-search-stream]') : null;
      if (!page && elt.getAttribute && elt.getAttribute('data-search-stream')) { page = elt; }
      if (!page) { return; }
      if (typeof EventSource === 'undefined') { return; }

      // Close any previous stream (tab switch / re-query / navigating away).
      if (window.__atomicSearchES) { try { window.__atomicSearchES.close(); } catch (e) {} window.__atomicSearchES = null; }

      var url = page.getAttribute('data-search-stream');
      var mdSection   = page.querySelector('[data-section="md"]');
      var codeSection = page.querySelector('[data-section="code"]');
      var codeStarted = false;

      var es = new EventSource(url);
      window.__atomicSearchES = es;

      es.addEventListener('md', function(e) {
        if (mdSection) { mdSection.innerHTML = e.data; }
      });
      es.addEventListener('code', function(e) {
        if (!codeSection) { return; }
        if (!codeStarted) { codeSection.innerHTML = ''; codeStarted = true; }
        codeSection.insertAdjacentHTML('beforeend', e.data);
      });
      es.addEventListener('end', function() {
        [mdSection, codeSection].forEach(function(s) {
          if (!s) { return; }
          var l = s.querySelector('.search-loading');
          if (l) { l.remove(); }
          if (!s.innerHTML.trim()) { s.innerHTML = '<p class="md-search-empty">No results.</p>'; }
        });
        es.close();
        if (window.__atomicSearchES === es) { window.__atomicSearchES = null; }
      });
      es.onerror = function() {
        es.close();
        if (window.__atomicSearchES === es) { window.__atomicSearchES = null; }
      };
    });
    </script>
    <!-- FE3 Network View — its own page (/graph), not a client-only toggle.
         The #btn-graph button in the top bar navigates to /graph (htmx, push:url), so
         the view is URL-addressable, history-tracked, and refresh-survivable. The
         /graph fragment carries a [data-system-graph] container; the htmx.onLoad
         handler below mounts Cytoscape+ELK into it (same delegated pattern as the rail
         mini-graph), restores zoom/pan from the URL, and records subsequent zoom/pan
         changes back into the URL (?z=&px=&py=) via replaceState.
         Node interactions: mouseover → preview card · mouseout → hide · tap → content
         modal over the blurred graph ("Open full page →" navigates to the page). -->
    <script>
    (function() {
      var currentPage = null;       // last /page/ URL loaded (for the "back to page" toggle)
      var VIEW_DEBOUNCE_MS = 250;   // how long after the last zoom/pan before writing the URL

      function inSystemMode() { return document.body.classList.contains('mode-system'); }

      // updateGraphBtnState syncs #btn-graph aria-pressed + active class to the mode.
      function updateGraphBtnState(active) {
        var btn = document.getElementById('btn-graph');
        if (!btn) { return; }
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        if (active) { btn.classList.add('btn-graph-active'); }
        else { btn.classList.remove('btn-graph-active'); }
      }

      // Leaving the graph: destroy the instance, drop system mode, reset the button,
      // dismiss any open card/modal. Called when #main-pane settles with non-graph
      // content (nav click, node "open full page", Back to a page, etc.).
      function teardownSystemGraph() {
        if (window.__systemCy) { try { window.__systemCy.destroy(); } catch (e) {} window.__systemCy = null; }
        document.body.classList.remove('mode-system');
        updateGraphBtnState(false);
        AtomicGraphUI.hidePreviewCard();
        AtomicGraphUI.closePageModal();
      }

      // Track current page + clean up system mode whenever #main-pane swaps. htmx 4:
      // colon-format events carry detail.ctx (ctx.target = resolved swap target,
      // ctx.request.action = request path); listen on document — a detached source
      // element dispatches there, not on body.
      document.addEventListener('htmx:after:swap', function(evt) {
        var ctx = evt.detail && evt.detail.ctx;
        var tgt = ctx && ctx.target;
        if (!tgt || tgt.id !== 'main-pane') { return; }
        var path = ctx.request && ctx.request.action;
        if (path && path.indexOf('/page/') === 0) { currentPage = path; }
        // Anything that isn't the system graph means we're no longer in system mode.
        if (!tgt.querySelector('[data-system-graph]') && inSystemMode()) {
          teardownSystemGraph();
        }
      });

      // ── URL view-state (zoom + pan) ──────────────────────────────────────────
      // /graph?z=<zoom>&px=<panX>&py=<panY>. Restored on mount; written with
      // replaceState (never push) so dragging/zooming can't flood the history.
      function readViewFromURL() {
        var p = new URLSearchParams(window.location.search);
        var z = parseFloat(p.get('z')), px = parseFloat(p.get('px')), py = parseFloat(p.get('py'));
        if (isFinite(z) && isFinite(px) && isFinite(py)) { return { zoom: z, pan: { x: px, y: py } }; }
        return null;
      }
      function writeViewToURL(cy) {
        if (window.location.pathname !== '/graph') { return; }
        var pan = cy.pan();
        var qs = 'z=' + cy.zoom().toFixed(4) + '&px=' + pan.x.toFixed(2) + '&py=' + pan.y.toFixed(2);
        try { window.history.replaceState(window.history.state, '', '/graph?' + qs); } catch (e) {}
      }

      // buildLegend constructs the type-filter chip bar from the types present in the
      // graph. Colors come from atomicCyTypeColors() (single source of truth). Each
      // chip toggles visibility of the matching nodes in the live instance.
      function buildLegend(cy, elems, mainPane) {
        var seenTypes = {};
        var nodeList = Array.isArray(elems) ? elems : ((elems && elems.nodes) || []);
        nodeList.forEach(function(el) { if (el.data && el.data.type) { seenTypes[el.data.type] = true; } });
        var types = Object.keys(seenTypes).sort();
        if (!types.length) { return; }

        var colorMap = atomicCyTypeColors();
        var hiddenTypes = {};

        var legend = document.createElement('div');
        legend.id = 'graph-legend';
        legend.className = 'graph-legend';

        types.forEach(function(type) {
          var color = colorMap[type] || '#89b4fa';
          var chip = document.createElement('button');
          chip.className = 'graph-legend-chip graph-legend-chip-active';
          chip.type = 'button';
          chip.setAttribute('data-type', type);
          chip.setAttribute('aria-pressed', 'true');

          var swatch = document.createElement('span');
          swatch.className = 'graph-legend-swatch';
          swatch.style.background = color;
          var label = document.createElement('span');
          label.textContent = type;
          chip.appendChild(swatch);
          chip.appendChild(label);

          chip.addEventListener('click', function() {
            if (!cy) { return; }
            if (hiddenTypes[type]) {
              cy.nodes('[type="' + type + '"]').style('display', 'element');
              delete hiddenTypes[type];
              chip.classList.add('graph-legend-chip-active');
              chip.setAttribute('aria-pressed', 'true');
            } else {
              cy.nodes('[type="' + type + '"]').style('display', 'none');
              hiddenTypes[type] = true;
              chip.classList.remove('graph-legend-chip-active');
              chip.setAttribute('aria-pressed', 'false');
            }
          });
          legend.appendChild(chip);
        });
        mainPane.appendChild(legend);
      }

      // ── Layout cache (IndexedDB, keyed by the realm sha256 fingerprint) ────────
      // The ELK 'stress' layout is the real cost of opening the Network View — it
      // recomputes node positions every mount (the Cytoscape instance is destroyed
      // on exit). We cache the computed positions in IndexedDB keyed by the server's
      // filesystem fingerprint (the X-Graph-Fingerprint header — a sha256 over the
      // realm that changes on ANY edit, so it invalidates correctly). Subsequent
      // opens replay the saved positions with a 'preset' layout (no algorithm) so
      // the graph appears instantly, and IndexedDB persists across browser sessions.
      var LAYOUT_DB = 'atomic-serve', LAYOUT_STORE = 'graph-layout';

      function idbOpen() {
        return new Promise(function(resolve, reject) {
          if (!window.indexedDB) { reject(new Error('no indexedDB')); return; }
          var req = indexedDB.open(LAYOUT_DB, 1);
          req.onupgradeneeded = function() {
            if (!req.result.objectStoreNames.contains(LAYOUT_STORE)) {
              req.result.createObjectStore(LAYOUT_STORE);
            }
          };
          req.onsuccess = function() { resolve(req.result); };
          req.onerror = function() { reject(req.error); };
        });
      }
      function loadCachedLayout(key) {
        if (!key) { return Promise.resolve(null); }
        return idbOpen().then(function(db) {
          return new Promise(function(resolve) {
            var rq = db.transaction(LAYOUT_STORE, 'readonly').objectStore(LAYOUT_STORE).get(key);
            rq.onsuccess = function() { resolve(rq.result || null); };
            rq.onerror = function() { resolve(null); };
          });
        }).catch(function() { return null; });
      }
      function saveCachedLayout(key, positions) {
        if (!key) { return; }
        idbOpen().then(function(db) {
          db.transaction(LAYOUT_STORE, 'readwrite').objectStore(LAYOUT_STORE).put(positions, key);
        }).catch(function() {});
      }

      // Mount the system graph into the [data-system-graph] container delivered by
      // the /graph fragment. Guarded against double-mount (a dataset flag).
      function mountSystemGraph(container) {
        if (container.dataset.systemMounted === '1') { return; }
        if (typeof cytoscape === 'undefined') { return; }
        container.dataset.systemMounted = '1';

        var mainPane = document.getElementById('main-pane');
        document.body.classList.add('mode-system');
        updateGraphBtnState(true);

        function clearSystemLoading() {
          var l = mainPane.querySelector('.system-graph-loading');
          if (l) { l.remove(); }
        }

        var graphFP = null; // realm fingerprint from the response header (cache key)
        fetch('/graph/data')
          .then(function(r) { graphFP = r.headers.get('X-Graph-Fingerprint'); return r.json(); })
          .then(function(elems) {
            // Look up a cached layout for this exact realm state, then mount.
            return loadCachedLayout(graphFP).then(function(cachedPos) { return { elems: elems, cachedPos: cachedPos }; });
          })
          .then(function(bundle) {
            var elems = bundle.elems;
            var cachedPos = bundle.cachedPos;

            // Degree (link count) per node → 'deg' data, capped, which drives the
            // degree-based node sizing in atomicCyStyle (hubs bigger, leaves smaller).
            var deg = {};
            (elems.edges || []).forEach(function(e) {
              var s = e.data && e.data.source, t = e.data && e.data.target;
              if (s != null) { deg[s] = (deg[s] || 0) + 1; }
              if (t != null) { deg[t] = (deg[t] || 0) + 1; }
            });
            (elems.nodes || []).forEach(function(n) {
              if (n.data) { n.data.deg = Math.min(deg[n.data.id] || 0, 16); }
            });

            // Cached positions → 'preset' (instant). Fresh → cola, the force-directed
            // layout engine (one-shot, Obsidian-like organic arrangement).
            var layout = cachedPos
              ? { name: 'preset', positions: cachedPos, fit: false }
              : { name: 'cola', animate: true, fit: true, maxSimulationTime: 2500, avoidOverlap: true, nodeSpacing: function() { return 8; }, edgeLength: 100, randomize: false, infinite: false };

            var cy = cytoscape({
              container: container,
              elements: elems,
              layout: layout,
              style: atomicCyStyle(),
              // Wide bound at construction so the initial fit (which can need a small
              // zoom for a big graph) isn't clamped; finishMount tightens it below.
              minZoom: 0.02,
              maxZoom: 2.2
            });
            window.__systemCy = cy;

            var saved = readViewFromURL();
            var recording = false; // ignore programmatic initial view; record user changes after

            // finishMount applies the initial view, builds the legend, caches a
            // freshly computed layout, and turns on zoom/pan→URL recording.
            // Idempotent so it runs exactly once whether fired by layoutstop (ELK,
            // async) or the preset fallback below. A 'preset' layout (cached
            // positions) settles synchronously during construction — before this
            // listener attaches — so without the fallback layoutstop is missed and
            // recording would stay off, killing the URL params on cached opens.
            var finished = false;
            function finishMount() {
              if (finished) { return; }
              finished = true;
              clearSystemLoading();
              cy.resize();
              // Fit once to measure the "whole graph fills the viewport" zoom, then cap
              // zoom-out at half that (graph can shrink to ~half size, no further — no
              // zooming into an unreadable speck) and keep a sane zoom-in ceiling.
              cy.fit(undefined, 24);
              var fitZoom = cy.zoom();
              cy.minZoom(fitZoom * 0.5);
              cy.maxZoom(2.2);
              // Restore the saved view from the URL if present (else keep the fit).
              if (saved) { cy.zoom(saved.zoom); cy.pan(saved.pan); }
              buildLegend(cy, elems, mainPane);
              // Persist the freshly computed layout (debounced) so the next open
              // replays it instantly. Cached opens haven't changed anything yet.
              if (!cachedPos) { scheduleSave(); }
              setTimeout(function() { recording = true; }, 60);
            }
            cy.one('layoutstop', finishMount);
            // Preset settles immediately; ensure finishMount still runs even if
            // layoutstop fired before the listener attached. Force layouts are async
            // and rely on layoutstop alone (no premature fit before they complete).
            if (cachedPos) { setTimeout(finishMount, 0); }
            cy.ready(function() { cy.resize(); });

            // Debounced position save: continuous physics keeps nudging positions,
            // so writes to IndexedDB are coalesced rather than thrashed (this is what
            // lets continuous physics and the layout cache coexist).
            var saveTimer = null;
            function scheduleSave() {
              if (!graphFP) { return; }
              clearTimeout(saveTimer);
              saveTimer = setTimeout(function() {
                var positions = {};
                cy.nodes().forEach(function(n) { var p = n.position(); positions[n.id()] = { x: p.x, y: p.y }; });
                saveCachedLayout(graphFP, positions);
              }, 800);
            }

            // Dragging moves only the grabbed node (its own edges follow); the rest
            // of the graph stays put. An on-drag force sim was tried but any global
            // simulation repositions other nodes — and moving a neighbouring hub
            // swings all ITS edges, so unrelated edges lurch. The force-directed look
            // comes from the one-shot initial layout; manual drags just refine it and
            // persist on release.
            cy.on('dragfree', 'node', function() { scheduleSave(); });

            // Record user zoom/pan into the URL (debounced, replaceState).
            var viewTimer = null;
            cy.on('viewport', function() {
              if (!recording) { return; }
              clearTimeout(viewTimer);
              viewTimer = setTimeout(function() { writeViewToURL(cy); }, VIEW_DEBOUNCE_MS);
            });

            cy.on('mouseover', 'node', function(evt) { AtomicGraphUI.showPreviewCard(evt.target, mainPane); });
            cy.on('mouseout', 'node', function() { AtomicGraphUI.hidePreviewCard(); });
            cy.on('tap', 'node', function(evt) {
              AtomicGraphUI.hidePreviewCard();
              AtomicGraphUI.openPageModal(evt.target.data('id'), cy);
            });
          })
          .catch(function(e) {
            var l = mainPane.querySelector('.system-graph-loading');
            if (l) { l.textContent = 'Could not render the system graph.'; }
            console.error('system-graph /graph/data:', e);
          });
      }

      // Delegated mount: fires whenever the /graph fragment ([data-system-graph])
      // lands in #main-pane (button click, refresh, Back/Forward).
      htmx.onLoad(function(elt) {
        var c = (elt.matches && elt.matches('[data-system-graph]'))
          ? elt
          : (elt.querySelector ? elt.querySelector('[data-system-graph]') : null);
        if (c) { mountSystemGraph(c); }
      });

      document.addEventListener('DOMContentLoaded', function() {
        // #btn-graph: in page view → open /graph; in graph view → back to the page.
        // Delegated on document so it survives htmx history-restore body swaps —
        // a direct element listener would be lost when #btn-graph is replaced.
        document.addEventListener('click', function(e) {
          if (!e.target.closest || !e.target.closest('#btn-graph')) { return; }
          // In graph view → back to the last page (or landing); in page view → /graph.
          var target = inSystemMode() ? (currentPage || '{{.LandingURL}}') : '/graph';
          htmx.ajax('GET', target, { target: '#main-pane', swap: 'innerHTML' });
          if (window.history && window.history.pushState) { window.history.pushState(null, '', target); }
        });

        // Modal dismiss wiring (scrim backdrop, corner ×, Close button, Esc).
        AtomicGraphUI.wireDismiss();
      });
    }());
    </script>
</head>
<body>

<!-- ── top bar: brand · breadcrumb · search · theme toggle ───────────── -->
<header id="app-header">
    <a class="brand" href="{{.LandingURL}}" hx-get="{{.LandingURL}}" hx-target="#main-pane" hx-push-url="true" aria-label="atomic — home"><img class="brand-logo" src="/static/logo.png" alt="atomic"> atomic</a>
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <span class="breadcrumb-scope">{{.ScopeBadge}}</span>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-page" id="breadcrumb-page">{{.ScopeLabel}}</span>
    </nav>
    <div class="search-bar">
        <!-- Search is a command-palette dialog (#search-modal), opened by this
             trigger or ⌘K / Ctrl K. The md|code toggle and live results live in
             the dialog; Enter / "view all" opens the dedicated /search page. -->
        <button id="search-trigger" class="search-trigger" type="button"
                aria-haspopup="dialog" aria-label="Open search (Command K)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <span class="search-trigger-label">Search…</span>
            <kbd class="search-trigger-kbd">⌘K</kbd>
        </button>
    </div>
    <!-- Network / graph view toggle: shows/hides the full system graph -->
    <button class="theme-toggle" id="btn-graph" type="button"
            aria-label="Network view — toggle full graph" title="Network view"
            aria-pressed="false">
        <!-- Nodes-and-edges network glyph -->
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="6"  cy="6"  r="2.5"/>
            <circle cx="18" cy="6"  r="2.5"/>
            <circle cx="6"  cy="18" r="2.5"/>
            <circle cx="18" cy="18" r="2.5"/>
            <circle cx="12" cy="12" r="2.5"/>
            <line x1="8"  y1="6"  x2="15.5" y2="6"/>
            <line x1="6"  y1="8"  x2="6"    y2="15.5"/>
            <line x1="8"  y1="18" x2="15.5" y2="18"/>
            <line x1="18" y1="8"  x2="18"   y2="15.5"/>
            <line x1="7.7" y1="7.7" x2="10.2" y2="10.2"/>
            <line x1="16.3" y1="7.7" x2="13.8" y2="10.2"/>
            <line x1="7.7" y1="16.3" x2="10.2" y2="13.8"/>
            <line x1="16.3" y1="16.3" x2="13.8" y2="13.8"/>
        </svg>
    </button>
    <!-- Theme toggle: sun (dark→light) / moon (light→dark) -->
    <button class="theme-toggle" id="theme-toggle" type="button"
            aria-label="Toggle light / dark theme" title="Toggle light / dark">
        <!-- Moon icon — shown in light mode (click to go dark) -->
        <svg class="i-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <!-- Sun icon — shown in dark mode (click to go light) -->
        <svg class="i-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"/></svg>
    </button>
</header>

<!-- ── three-pane Obsidian shell ─────────────────────────────────────── -->
<div id="shell">

    <!-- left nav -->
    <nav id="nav-pane" aria-label="Navigation"
         hx-get="/nav"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="nav-section">
            <div class="nav-section-title">Loading…</div>

    <!-- middle content: page content (system graph toggle is now in the top bar) -->
    <div id="content-column">
        <main id="main-pane"
              hx-get="{{.LandingURL}}"

        <footer id="app-footer">

            <span class="footer-sep">·</span>

    <!-- right rail: Properties ▸ this-page graph ▸ OUT links ▸ IN links -->
    <!-- FE2 fills these slots with data; seams (IDs) are the contract -->

    <aside id="right-rail" aria-label="Page context">
        <section id="rail-props" class="rail-slot">

            <div class="rail-slot-label">→ OUT links</div>
            <div class="rail-slot-content" id="rail-out-content">

        <section id="rail-in" class="rail-slot">

            <div class="rail-slot-content" id="rail-in-content">
                <!-- FE2: backlinks into the focused page -->

</div>

<!-- ── search dialog (command palette) ──────────────────────────────────────
     Opened by #search-trigger or ⌘K / Ctrl K (or "/" when not typing).
     md|code toggle + debounced live results. Selecting an md result loads it
     into #main-pane; a code result opens the code modal (FE4 watches
     #search-results). Enter or "View all results" opens the /search page. -->
<div id="search-modal" role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-modal-box">
        <div class="search-modal-header">
            <span class="search-modal-icon" aria-hidden="true">⌕</span>
            <input id="search" type="search" class="search-modal-input"
                   placeholder="Search markdown or code…" aria-label="Search" autocomplete="off">
            <span class="search-toggle" role="group" aria-label="Search source">
                <button class="toggle-btn toggle-active" id="toggle-md" type="button" aria-pressed="true">md</button>
                <button class="toggle-btn" id="toggle-code" type="button" aria-pressed="false">code</button>
            </span>
        </div>
        <div id="search-results" class="search-results" role="listbox" aria-label="Search results">
            <p class="md-search-empty">Type to search…</p>
        </div>
        <div class="search-modal-footer">
            <button id="search-viewall" type="button" class="search-viewall">View all results →</button>
            <span class="search-modal-hint"><kbd>Enter</kbd> view all · <kbd>Esc</kbd> close</span>
        </div>
    </div>
</div>

<!-- ── FE4 code modal: dimmed overlay with source pane + intel pane ──────── -->
<div id="code-modal" role="dialog" aria-modal="true" aria-label="Source file viewer">
    <div class="code-modal-box">
        <div class="code-modal-header">
            <span class="code-modal-title" id="code-modal-title"></span>
            <button class="code-modal-close" id="code-modal-close" type="button"

                <!-- filled by htmx.ajax GET /file/<path> (HX-Request fragment) -->
            </div>
            <div id="code-modal-intel-pane">
                <!-- Persistent back affordance for intel drill-downs (defines →
                     callers → node → …). Sits OUTSIDE #code-modal-intel so it
                     survives the hx-swap that replaces the intel content. -->
                <button id="code-modal-intel-back" class="code-modal-intel-back"
                        type="button" hidden aria-label="Back to previous code view">← Back</button>

        </div>
    </div>
</div>

<!-- Theme toggle: persists choice to localStorage, wins over OS on subsequent loads. -->
<script>
(function() {
  var btn = document.getElementById('theme-toggle');
  if (!btn) { return; }
  btn.addEventListener('click', function() {
    var root = document.documentElement;
    var current = root.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('atomic-serve-theme', next); } catch (e) {}
    // Re-apply Cytoscape styles now that CSS vars have flipped.
    // atomicCyStyle() reads getComputedStyle at call time, so calling it
    // AFTER the data-theme flip returns the new-theme colors.
    if (window.__systemCy) {
      window.__systemCy.style(atomicCyStyle());
    }
    if (window.__railCy) {
      window.__railCy.style(atomicCyStyle());
    }
    // Re-render any mermaid diagrams with the flipped palette.
    if (window.atomicMermaidRetheme) {
      window.atomicMermaidRetheme();
    }
  });
}());
</script>

<!-- Reset the content pane to the top after every htmx navigation. htmx swaps
     #main-pane's innerHTML without touching the scroll container, so a page
     opened from a scrolled position would otherwise land mid-document. Keyed on
     the swap target so only content swaps reset (intel/rail swaps are left
     alone); history restores swap <body>, not #main-pane, so Back/Forward keep
     their restored position. -->
<script>
document.addEventListener('htmx:after:swap', function(evt) {
  var ctx = evt.detail && evt.detail.ctx;
  var tgt = ctx && ctx.target;
  if (tgt && tgt.id === 'main-pane') { tgt.scrollTop = 0; }
});
</script>

<!-- FE5 search dialog (command palette).
     Trigger: #search-trigger click, ⌘K / Ctrl K, or "/" when not typing.
     md mode  → GET /search/md?q=   (literal grep over served .md files)
     code mode → GET /code/search?q= (federated symbol search)
     Selecting a result:
       md   → htmx.ajax GET /page/<file> into #main-pane + close dialog
       code → /file/…#L link caught by the FE4 delegated handler (watches
               #search-results) → opens the code modal; we close the dialog.
     Enter or "View all results" → /search?q=&src= page (browse everything).
     Esc / backdrop closes. -->
<script>
(function() {
  // Bind exactly once. On a history-cache-miss restore (Back/Forward) htmx 4
  // replaces the whole <body>, which re-executes this inline script; the guard
  // stops it stacking duplicate listeners. Every listener below is delegated on
  // `document` (never swapped) and every element is looked up fresh by id at use
  // time, so the single binding keeps driving whatever #search-* elements the
  // current body holds — search survives history restores instead of going dead.
  // (The previous version bound in DOMContentLoaded, which never re-fires after a
  // body swap, so the trigger/input/results listeners were orphaned.)
  if (window.__atomicSearchBooted) { return; }
  window.__atomicSearchBooted = true;

  var activeSource = 'md'; // 'md' | 'code'
  var debounceTimer = null;
  var debounceMs = 200;
  var searchAbort = null; // aborts the in-flight fetch when a newer query supersedes it

  function byId(id) { return document.getElementById(id); }
  function isOpen() {
    var modal = byId('search-modal');
    return !!(modal && modal.classList.contains('open'));
  }

  function openModal() {
    var modal = byId('search-modal');
    if (!modal) { return; }
    modal.classList.add('open');
    var input = byId('search');
    if (input) { input.focus(); input.select(); }
  }

  function closeModal() {
    var modal = byId('search-modal');
    if (modal) { modal.classList.remove('open'); }
  }

  function renderResults(html) {
    var results = byId('search-results');
    if (results) { results.innerHTML = html; }
  }

  function setSource(src) {
    activeSource = src;
    var btnMd = byId('toggle-md'), btnCode = byId('toggle-code');
    if (src === 'md') {
      if (btnMd)   { btnMd.setAttribute('aria-pressed', 'true');    btnMd.classList.add('toggle-active'); }
      if (btnCode) { btnCode.setAttribute('aria-pressed', 'false'); btnCode.classList.remove('toggle-active'); }
    } else {
      if (btnCode) { btnCode.setAttribute('aria-pressed', 'true');  btnCode.classList.add('toggle-active'); }
      if (btnMd)   { btnMd.setAttribute('aria-pressed', 'false');   btnMd.classList.remove('toggle-active'); }
    }
    var input = byId('search');
    runSearch(input ? input.value : '');
  }

  function runSearch(q) {
    q = (q || '').trim();
    if (!q) {
      renderResults('<p class="md-search-empty">Type to search…</p>');
      return;
    }
    // Cancel any prior in-flight request so fast typing can't paint stale results.
    if (searchAbort) { searchAbort.abort(); }
    searchAbort = new AbortController();
    renderResults('<p class="loading search-loading">Searching…</p>');
    var endpoint = activeSource === 'md'
      ? '/search/md?q=' + encodeURIComponent(q)
      : '/code/search?q=' + encodeURIComponent(q);
    fetch(endpoint, { headers: { 'HX-Request': 'true' }, signal: searchAbort.signal })
      .then(function(r) { return r.text(); })
      .then(renderResults)
      .catch(function(e) { if (e.name !== 'AbortError') { console.warn('search:', e); } });
  }

  // gotoSearchPage opens the dedicated /search page for the current query.
  function gotoSearchPage() {
    var input = byId('search');
    var q = (input && input.value || '').trim();
    if (!q) { return; }
    var url = '/search?q=' + encodeURIComponent(q) + '&src=' + activeSource;
    closeModal();
    htmx.ajax('GET', url, { target: '#main-pane', swap: 'innerHTML' });
    if (window.history && window.history.pushState) { window.history.pushState(null, '', url); }
  }

  // ── Delegated interactions (all on document, so they outlive body swaps) ──
  document.addEventListener('click', function(e) {
    var t = e.target;
    if (t.closest && t.closest('#search-trigger')) { openModal(); return; }
    if (t.closest && t.closest('#toggle-md'))      { setSource('md');   return; }
    if (t.closest && t.closest('#toggle-code'))    { setSource('code'); return; }
    if (t.closest && t.closest('#search-viewall')) { gotoSearchPage();  return; }

    // Backdrop click (the modal overlay itself, not its box) closes.
    var modal = byId('search-modal');
    if (modal && t === modal) { closeModal(); return; }

    // Result selection inside #search-results.
    var results = byId('search-results');
    if (results && results.contains(t)) {
      var el = t;
      while (el && el !== results) {
        if (el.tagName === 'A' || el.hasAttribute('data-page')) { break; }
        el = el.parentElement;
      }
      if (!el || el === results) { return; }
      var href = el.getAttribute('href') || el.getAttribute('data-page');
      if (!href) { return; }
      // md result → load the page into #main-pane and close.
      if (href.indexOf('/page/') === 0) {
        e.preventDefault();
        closeModal();
        htmx.ajax('GET', href, { target: '#main-pane', swap: 'innerHTML' });
        if (window.history && window.history.pushState) { window.history.pushState(null, '', href); }
        return;
      }
      // code result (/file/…#L) → FE4 delegated handler opens the code modal;
      // close the search dialog so the code modal is unobstructed.
      closeModal();
    }
  });

  // Debounced live search as the user types (delegated input event).
  document.addEventListener('input', function(e) {
    if (!e.target || e.target.id !== 'search') { return; }
    var val = e.target.value;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() { runSearch(val); }, debounceMs);
  });

  // Per-field keys (Enter/Esc in the search box) + global shortcuts (⌘K, "/", Esc).
  document.addEventListener('keydown', function(e) {
    if (e.target && e.target.id === 'search') {
      if (e.key === 'Enter')  { e.preventDefault(); gotoSearchPage(); return; }
      if (e.key === 'Escape') { closeModal(); return; }
    }
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault(); openModal(); return;
    }
    if (e.key === 'Escape' && isOpen()) { closeModal(); return; }
    if (e.key === '/' && !isOpen()) {
      var t = e.target, tag = t && t.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA' && !(t && t.isContentEditable)) {
        e.preventDefault(); openModal();
      }
    }
  });
}());
</script>

<!-- FE4 code-link delegated handler.
     Intercepts clicks on <a> elements within #main-pane and #right-rail whose
     href resolves to a source file (known extension set). On match: preventDefault,
     open #code-modal, load /file/<path> fragment into #code-modal-source and
     /code/file?path=<path> into #code-modal-intel via htmx.ajax.
     A file:line href (/file/foo.go#L42) strips the anchor for the fetch but
     re-applies it as a scroll anchor after swap. -->
<script>
(function() {
  // Known source file extensions that open the code modal.
  var SOURCE_EXTS = {
    "go": true, "ts": true, "tsx": true, "js": true, "jsx": true,
    "py": true, "rb": true, "rs": true, "java": true, "kt": true, "kts": true,
    "c": true, "cc": true, "cpp": true, "cxx": true, "h": true, "hpp": true,
    "cs": true, "php": true, "swift": true, "scala": true, "lua": true,
    "dart": true, "sql": true, "sh": true, "bash": true, "zsh": true,
    "ex": true, "exs": true, "erl": true, "hrl": true
  };

  var modal    = document.getElementById('code-modal');
  var modalSrc = document.getElementById('code-modal-source');
  var modalIntel = document.getElementById('code-modal-intel');
  var modalIntelBack = document.getElementById('code-modal-intel-back');
  var modalTitle = document.getElementById('code-modal-title');
  var closeBtn = document.getElementById('code-modal-close');

  // Intel-pane navigation stack. The intel pane drills defines → callers → node →
  // … by swapping #code-modal-intel in place; without a stack there is no way back
  // to the previous view. intelStack holds the URLs loaded into the pane; the
  // persistent #code-modal-intel-back button pops one level.
  var intelStack = [];
  function intelTop() { return intelStack[intelStack.length - 1]; }
  function updateIntelBack() {
    if (modalIntelBack) { modalIntelBack.hidden = intelStack.length <= 1; }
  }
  function loadIntel(url) {
    htmx.ajax('GET', url, {
      target: '#code-modal-intel',
      swap: 'innerHTML',
      headers: { 'HX-Request': 'true' }
    });
  }
  function intelGoBack() {
    if (intelStack.length <= 1) { return; }
    intelStack.pop();          // drop current
    loadIntel(intelTop());     // reload the previous view (no push)
    updateIntelBack();
  }
  if (modalIntelBack) { modalIntelBack.addEventListener('click', intelGoBack); }

  // Record forward drill-downs: a click on an hx-get link inside #code-modal-intel
  // pushes its URL so Back can return here. htmx still performs the swap.
  document.addEventListener('click', function(e) {
    if (!modalIntel) { return; }
    var el = e.target;
    while (el && el !== modalIntel) {
      if (el.tagName === 'A' && el.getAttribute && el.getAttribute('hx-get')) { break; }
      el = el.parentElement;
    }
    if (!el || el === modalIntel || el.tagName !== 'A' || !modalIntel.contains(el)) { return; }
    var url = el.getAttribute('hx-get');
    if (url && url !== intelTop()) { intelStack.push(url); updateIntelBack(); }
  });

  // Loading feedback: whenever a request targets the intel pane (a drill-down or
  // Back), show a spinner immediately so the click registers before the swap.
  document.addEventListener('htmx:before:request', function(e) {
    var ctx = e.detail && e.detail.ctx;
    var t = ctx && ctx.target;
    if (t && t.id === 'code-modal-intel') {
      t.innerHTML = '<p class="loading">Loading…</p>';
    }
  });

  function getExtension(href) {
    // Strip query string and anchor, then get the file extension.
    var clean = href.split('?')[0].split('#')[0];
    var dot = clean.lastIndexOf('.');
    if (dot === -1) { return ''; }
    return clean.slice(dot + 1).toLowerCase();
  }

  // currentPageRelpath returns the realm-root-relative path of the page currently
  // shown in #main-pane. The page fragment stamps it on #page-content[data-relpath].
  // Returns '' when no page is loaded (system mode, 404, search-only).
  function currentPageRelpath() {
    var pc = document.querySelector('#main-pane #page-content[data-relpath]');
    return pc ? pc.getAttribute('data-relpath') : '';
  }

  // resolveSourceHref turns a content-body href (which may be page-relative, e.g.
  // "../../search.sh") into a realm-root-relative path suitable for /file/<path>.
  // Page-relative links are resolved against the current page's URL so they don't
  // collapse to a wrong path when handed verbatim to /file/. Returns '' when the
  // href is external (http/https) — those must not open the source modal.
  function resolveSourceHref(href) {
    if (/^https?:/i.test(href)) { return ''; }
    if (href.indexOf('/') === 0) {
      // Already a root-absolute path (e.g. /file/<x> handled earlier, or /<x>).
      return href.replace(/^\//, '');
    }
    var rel = currentPageRelpath();
    var base = rel
      ? window.location.origin + '/page/' + rel
      : window.location.href;
    try {
      var u = new URL(href, base);
      return u.pathname.replace(/^\/(page|file)\//, '').replace(/^\//, '') + (u.hash || '');
    } catch (e) {
      return '';
    }
  }

  function openModal(filePath, anchor) {
    modalTitle.textContent = filePath;
    modalSrc.innerHTML = '<p class="loading">Loading…</p>';
    modalIntel.innerHTML = '<p class="loading">Loading…</p>';
    modal.classList.add('open');

    // Load highlighted source as fragment into #code-modal-source.
    htmx.ajax('GET', '/file/' + filePath, {
      target: '#code-modal-source',
      swap: 'innerHTML',
      headers: { 'HX-Request': 'true' }
    }).then(function() {
      // If the original href had a line anchor, scroll to it; otherwise reset to
      // the top so a file opened after scrolling another one starts at line 1.
      if (anchor) {
        var el = document.getElementById(anchor);
        if (el) { el.scrollIntoView({ block: 'center' }); }
      } else {
        modalSrc.scrollTop = 0;
      }
    });

    // Load code-intel symbols into #code-modal-intel and seed the intel stack
    // with this file's defines view as the root (Back is hidden until a drill-down).
    var intelURL = '/code/file?path=' + encodeURIComponent(filePath);
    intelStack = [intelURL];
    updateIntelBack();
    loadIntel(intelURL);
  }

  function closeModal() {
    modal.classList.remove('open');
  }

  // Close on ✕ button.
  if (closeBtn) { closeBtn.addEventListener('click', closeModal); }

  // Close on backdrop click (click on the modal overlay, not the box).
  if (modal) {
    modal.addEventListener('click', function(e) {
      if (e.target === modal) { closeModal(); }
    });
  }

  // Close on Esc.
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal && modal.classList.contains('open')) {
      closeModal();
    }
  });

  // Delegated click handler: intercept source-file links inside
  // #main-pane, #right-rail, and #search-results (FE5: code results
  // in the dropdown open the code modal instead of full-page-navigating).
  document.addEventListener('click', function(e) {
    // Walk up from the target to find an <a> element.
    var el = e.target;
    while (el && el !== document.body) {
      if (el.tagName === 'A') { break; }
      el = el.parentElement;
    }
    if (!el || el.tagName !== 'A') { return; }

    var href = el.getAttribute('href');
    if (!href) { return; }

    // Only intercept links inside #main-pane, #right-rail, or #search-results.
    var mainPane      = document.getElementById('main-pane');
    var rightRail     = document.getElementById('right-rail');
    var searchResults = document.getElementById('search-results');
    if ((!mainPane      || !mainPane.contains(el)) &&
        (!rightRail     || !rightRail.contains(el)) &&
        (!searchResults || !searchResults.contains(el))) {
      return;
    }

    // /file/<path> links from the existing route — open the modal.
    if (href.indexOf('/file/') === 0) {
      e.preventDefault();
      var withoutPrefix = href.slice('/file/'.length);
      var hashIdx = withoutPrefix.indexOf('#');
      var anchor = '';
      var filePath = withoutPrefix;
      if (hashIdx !== -1) {
        anchor   = withoutPrefix.slice(hashIdx + 1);
        filePath = withoutPrefix.slice(0, hashIdx);
      }
      openModal(filePath, anchor);
      return;
    }

    // Detect plain relative links to source files (e.g. [billing](billing.go)
    // in rendered markdown, or a page-relative ../../search.sh). Resolve against
    // the current page so the /file/ fetch targets the right realm-relative path.
    var ext = getExtension(href);
    if (ext && SOURCE_EXTS[ext]) {
      var resolved = resolveSourceHref(href);
      if (!resolved) { return; } // external or unresolvable — leave to default
      e.preventDefault();
      var hashIdx2 = resolved.indexOf('#');
      var anchor2 = '';
      var path    = resolved;
      if (hashIdx2 !== -1) {
        anchor2 = resolved.slice(hashIdx2 + 1);
        path    = resolved.slice(0, hashIdx2);
      }
      openModal(path, anchor2);
    }
  });
}());
</script>
<!-- Breadcrumb folder navigation: ancestor segments are <a data-nav-folder="<prefix>">.
     Clicking one loads that folder into #main-pane (the /page handler serves a
     folder index file or a generated listing). Without this handler the breadcrumb
     links look clickable (styled as links) but do nothing. -->
<script>
(function() {
  document.addEventListener('click', function(e) {
    var el = e.target;
    while (el && el !== document.body) {
      if (el.tagName === 'A' && el.classList && el.classList.contains('breadcrumb-folder')) { break; }
      el = el.parentElement;
    }
    if (!el || el.tagName !== 'A' || !el.classList.contains('breadcrumb-folder')) { return; }
    var folder = el.getAttribute('data-nav-folder');
    if (!folder) { return; }
    e.preventDefault();
    htmx.ajax('GET', '/page/' + folder + '/', { target: '#main-pane', swap: 'innerHTML' });
  });
}());
</script>

<!-- CP2: Page modal — static HTML, shown/hidden by setSystemMode() JS.
     The scrim fades in via .open class; the modal slides up via @keyframes cy-modal-in.
     Dismiss wiring (scrim-click, close ×, dismiss button, Esc) is registered once
     in the DOMContentLoaded block in the FE3 <script> in <head>.
     The "Open full page →" button calls setPageMode() → navigates into the normal page view. -->
<div id="cy-page-modal-scrim">

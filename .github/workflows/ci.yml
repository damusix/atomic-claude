name: CI

on:
  push:
    # Run push-CI on every human branch, but NOT release-please's bot branch.
    # That branch is `old-main + release-commit`; its tip in isolation is never
    # a meaningful state and goes stale-red whenever a fix lands on main after
    # the release PR was cut. The pull_request trigger below still gates it on
    # the merge-into-main result, which always reflects current main.
    branches-ignore:
      - "release-please--branches--**"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./atomic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./atomic/go.mod

      - name: Render templates
        working-directory: .
        run: make render

      - name: Verify render is committed
        run: git diff --exit-code

      - name: Generate bundle
        run: go generate ./...

      - name: Verify bundle is committed
        run: git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Validate
        working-directory: ./atomic
        run: |
          make build
          ../bin/atomic validate

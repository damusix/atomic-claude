name: CI

on:
  # Push-CI runs only on main (post-merge). PR branches are gated by the
  # pull_request trigger below, so a branch with an open PR is tested once —
  # not twice, as the previous push-on-every-branch trigger did (one run for the
  # branch push, a duplicate for the PR). The release-please bot branch is
  # naturally excluded (it isn't main); its merge-into-main result is still
  # gated via pull_request, which always reflects current main.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./atomic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./atomic/go.mod

      - name: Render templates
        working-directory: .
        run: make render

      - name: Verify render is committed
        run: git diff --exit-code

      - name: Generate bundle
        run: go generate ./...

      - name: Verify bundle is committed
        run: git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Validate
        working-directory: ./atomic
        run: |
          make build
          ../bin/atomic validate
